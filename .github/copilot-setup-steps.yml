# Copilot Coding Agent Setup Steps
# Installs dependencies and builds the project so Copilot agents
# (Claude, Codex) can work on issues and PRs autonomously.

name: "Copilot Setup Steps"

on: workflow_dispatch

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Prompt.sln

      - name: Build solution
        run: dotnet build Prompt.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test Prompt.sln --no-build --configuration Release --verbosity normal

      - name: Verify XML documentation generation
        run: |
          # Ensure XML docs are generated (catches missing XML doc comments)
          test -f src/bin/Release/net8.0/Prompt.xml

      - name: Check formatting
        run: dotnet format Prompt.sln --verify-no-changes --verbosity diagnostic || echo 'Format drift detected (non-blocking)'
