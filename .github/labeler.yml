# Labeler configuration — maps file path patterns to PR labels.
# Used by actions/labeler@v6 in the auto-label workflow.

core:
  - changed-files:
    - any-glob-to-any-file: 'src/**'

tests:
  - changed-files:
    - any-glob-to-any-file: 'tests/**'

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'docs/**'
      - '**/*.md'

ci/cd:
  - changed-files:
    - any-glob-to-any-file: '.github/workflows/**'

docker:
  - changed-files:
    - any-glob-to-any-file:
      - 'Dockerfile'
      - '.dockerignore'
      - 'docker-compose*.yml'

security:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/workflows/codeql.yml'
      - '.github/dependabot.yml'
      - '.github/codeql/**'
      - 'SECURITY.md'

config:
  - changed-files:
    - any-glob-to-any-file:
      - '*.sln'
      - 'src/*.csproj'
      - 'tests/*.csproj'
      - '.editorconfig'
      - '.gitignore'
      - 'NuGet.Config'

dependencies:
  - changed-files:
    - any-glob-to-any-file:
      - 'src/*.csproj'
      - 'tests/*.csproj'

github-config:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/**'
      - '!.github/workflows/**'
