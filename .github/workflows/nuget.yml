name: Publish NuGet Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 5.24.0)'
        required: true
        type: string
      push_to_nuget:
        description: 'Push to NuGet.org'
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore src/Prompt.csproj

    - name: Build
      run: dotnet build src/Prompt.csproj -c Release -p:Version=${{ inputs.version }} --no-restore

    - name: Test
      run: dotnet test tests/Prompt.Tests.csproj -c Release --verbosity normal -- RunConfiguration.CollectSourceInformation=true

    - name: Pack
      run: dotnet pack src/Prompt.csproj -c Release -p:Version=${{ inputs.version }} --no-build -o ./nupkg

    - name: Push to GitHub Packages
      shell: pwsh
      run: |
        Get-ChildItem ./nupkg -Filter *.nupkg | ForEach-Object {
          dotnet nuget push $_.FullName --source "https://nuget.pkg.github.com/sauravbhattacharya001/index.json" --api-key $env:GH_TOKEN --skip-duplicate
        }
      continue-on-error: true
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Push to NuGet.org
      if: inputs.push_to_nuget == true
      shell: pwsh
      run: |
        Get-ChildItem ./nupkg -Filter *.nupkg | ForEach-Object {
          dotnet nuget push $_.FullName --source "https://api.nuget.org/v3/index.json" --api-key $env:NUGET_API_KEY --skip-duplicate
        }
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
