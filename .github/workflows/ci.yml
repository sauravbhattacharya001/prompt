name: CI + Coverage

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build, Test & Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run tests with coverage
        run: |
          dotnet test tests/Prompt.Tests.csproj \
            --no-build \
            -c Release \
            --logger "trx;LogFileName=results.trx" \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat="cobertura%2cjson" \
            /p:CoverletOutput=./coverage/ \
            /p:Include="[Prompt]*" \
            /p:ExcludeByAttribute="GeneratedCodeAttribute" \
            /p:Threshold=50 \
            /p:ThresholdType=line \
            /p:ThresholdStat=total

      - name: Generate coverage summary
        if: always()
        run: |
          if [ -f tests/coverage/coverage.cobertura.xml ]; then
            LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' tests/coverage/coverage.cobertura.xml | head -1)
            if [ -n "$LINE_RATE" ]; then
              PCT=$(echo "$LINE_RATE * 100" | bc -l | xargs printf "%.1f")
              {
                echo "## Coverage Summary"
                echo ""
                echo "| Metric | Value |"
                echo "|--------|-------|"
                echo "| Line coverage | ${PCT}% |"
                echo "| Threshold | 50% (line) |"
                echo ""
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Upload coverage to Codecov
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v5
        with:
          files: tests/coverage/coverage.cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: tests/TestResults/results.trx

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: tests/coverage/
