name: CI + Coverage

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  format-check:
    name: Code Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - run: dotnet format --verify-no-changes --verbosity diagnostic

  vulnerability-audit:
    name: Dependency Vulnerability Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"
      - name: Restore packages
        run: dotnet restore
      - name: Check for vulnerable packages
        run: |
          dotnet list package --vulnerable --include-transitive 2>&1 | tee audit.txt
          if grep -qi "has the following vulnerable packages" audit.txt; then
            echo "::warning::Vulnerable dependencies detected — review audit output above"
          fi
      - name: Check for deprecated packages
        run: dotnet list package --deprecated --include-transitive
        continue-on-error: true

  build-and-test:
    name: Build, Test & Coverage (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Run tests with coverage
        run: dotnet test tests/Prompt.Tests.csproj --no-build -c Release --logger "trx;LogFileName=results.trx" /p:CollectCoverage=true /p:CoverletOutputFormat="cobertura%2cjson" /p:CoverletOutput=./coverage/ /p:Include="[Prompt]*" /p:ExcludeByAttribute="GeneratedCodeAttribute" /p:Threshold=50 /p:ThresholdType=line /p:ThresholdStat=total

      - name: Generate HTML coverage report
        if: always() && runner.os == 'Linux'
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          if [ -f tests/coverage/coverage.cobertura.xml ]; then
            reportgenerator \
              -reports:tests/coverage/coverage.cobertura.xml \
              -targetdir:tests/coverage/html \
              -reporttypes:"Html;MarkdownSummaryGithub;Badges" \
              -title:"Prompt Coverage Report"
          fi

      - name: Generate coverage summary
        if: always() && runner.os == 'Linux'
        run: |
          if [ -f tests/coverage/coverage.cobertura.xml ]; then
            LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' tests/coverage/coverage.cobertura.xml | head -1)
            BRANCH_RATE=$(grep -oP 'branch-rate="\K[^"]+' tests/coverage/coverage.cobertura.xml | head -1)
            if [ -n "$LINE_RATE" ]; then
              LINE_PCT=$(echo "$LINE_RATE * 100" | bc -l | xargs printf "%.1f")
              BRANCH_PCT=$(echo "${BRANCH_RATE:-0} * 100" | bc -l | xargs printf "%.1f")
              {
                echo "## 📊 Coverage Summary"
                echo ""
                echo "| Metric | Value |"
                echo "|--------|-------|"
                echo "| Line coverage | ${LINE_PCT}% |"
                echo "| Branch coverage | ${BRANCH_PCT}% |"
                echo "| Threshold | 50% (line) |"
                echo ""
              } >> "$GITHUB_STEP_SUMMARY"
              if [ -f tests/coverage/html/SummaryGithub.md ]; then
                cat tests/coverage/html/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          fi

      - name: Add PR coverage comment
        if: github.event_name == 'pull_request' && always() && runner.os == 'Linux'
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: coverage
          path: tests/coverage/html/SummaryGithub.md
        continue-on-error: true

      - name: Upload coverage to Codecov
        if: github.event_name == 'push' && runner.os == 'Linux'
        uses: codecov/codecov-action@v7
        with:
          files: tests/coverage/coverage.cobertura.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}
          path: tests/TestResults/results.trx

      - name: Upload coverage report
        if: always() && runner.os == 'Linux'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            tests/coverage/
            tests/coverage/html/
